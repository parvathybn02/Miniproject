{% extends "base.html" %}

{% block title %}Study Rooms - StudyAI{% endblock %}

{% block head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
{% endblock %}

{% block content %}
<div class="rooms-view">
    <div class="header">
        <a href="{{ url_for('dashboard.index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        <h1 class="poppins">Study Rooms</h1>
        <p class="text-muted">Collaborate with peers in real-time.</p>
    </div>

    <div class="rooms-container">
        <!-- Room Selector -->
        <div id="roomSelector" class="glass glass-card selector-card">
            <h3 class="poppins">Join a Room</h3>
            <div class="input-group">
                <input type="text" id="roomCode" placeholder="Enter room code (e.g. EXAM2024)">
                <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
            </div>
            <div class="divider"><span>OR</span></div>
            <button class="btn glass" style="width: 100%;" onclick="createRoom()">Create New Room</button>
        </div>

        <!-- Chat Interface -->
        <div id="chatInterface" class="glass glass-card chat-card" style="display: none;">
            <div class="chat-main">
                <div class="chat-header">
                    <div class="room-info">
                        <h3 class="poppins" id="activeRoomName">Room: General</h3>
                        <span class="status"><i class="fas fa-circle"></i> Live</span>
                    </div>
                    <button class="btn glass" onclick="leaveRoom()"><i class="fas fa-sign-out-alt"></i> Leave</button>
                </div>
                <div class="messages" id="messageList">
                    <!-- Messages -->
                </div>
                <div class="chat-input">
                    <input type="text" id="messageInput" placeholder="Type a message...">
                    <button class="btn btn-primary" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            
            <div class="chat-sidebar">
                <div class="sidebar-header poppins">
                    <i class="fas fa-users"></i> Active Students
                </div>
                <div class="user-list" id="userList">
                    <!-- User list items -->
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: var(--text-muted); text-decoration: none; margin-bottom: 1.5rem; font-weight: 500; transition: var(--transition); }
    .back-link:hover { color: var(--primary); }

    .rooms-view { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .rooms-container { display: flex; flex-direction: column; gap: 2rem; margin-top: 2rem; }
    
    .selector-card { padding: 3rem; max-width: 500px; margin: 0 auto; text-align: center; }
    .input-group { display: flex; gap: 0.5rem; margin: 1.5rem 0; }
    .input-group input { flex: 1; padding: 0.75rem; border-radius: 10px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.02); }
    .divider { margin: 1.5rem 0; position: relative; color: var(--text-muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--glass-border); }
    .divider::before { left: 0; } .divider::after { right: 0; }

    .chat-card { height: 650px; display: flex; flex-direction: row; padding: 0; overflow: hidden; }
    .chat-main { flex: 4; display: flex; flex-direction: column; border-right: 1px solid var(--glass-border); }
    .chat-sidebar { flex: 1.2; display: flex; flex-direction: column; background: rgba(255,255,255,0.02); }
    
    .sidebar-header { padding: 1.5rem; font-weight: 600; font-size: 0.9rem; border-bottom: 1px solid var(--glass-border); display: flex; align-items: center; gap: 0.75rem; }
    .user-list { padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; overflow-y: auto; }
    .user-item { 
        padding: 0.75rem 1rem; border-radius: 10px; background: rgba(255,255,255,0.05); 
        display: flex; align-items: center; gap: 0.75rem; font-size: 0.9rem; font-weight: 500;
        animation: fadeIn 0.3s ease forwards;
    }
    .user-item i { font-size: 0.8rem; color: #10B981; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    .chat-header { padding: 1.25rem 2rem; border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center; }
    .room-info h3 { margin-bottom: 0.25rem; }
    .status { font-size: 0.75rem; color: #10B981; display: flex; align-items: center; gap: 0.4rem; font-weight: 600; }
    
    .messages { flex: 1; padding: 2rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
    .message { max-width: 70%; padding: 0.75rem 1.25rem; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); }
    .message.sent { align-self: flex-end; background: var(--primary); color: white; border-color: var(--primary); }
    .msg-user { font-size: 0.7rem; font-weight: 700; margin-bottom: 0.25rem; opacity: 0.8; }
    
    .chat-input { padding: 1.25rem 2rem; border-top: 1px solid var(--glass-border); display: flex; gap: 1rem; }
    .chat-input input { flex: 1; padding: 0.75rem 1.5rem; border-radius: 15px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.02); color: white; outline: none; }
</style>

<script>
    let socket = io();
    let currentRoom = null;

    function joinRoom() {
        const code = document.getElementById('roomCode').value;
        if (!code) return;
        
        currentRoom = code;
        document.getElementById('roomSelector').style.display = 'none';
        document.getElementById('chatInterface').style.display = 'flex';
        document.getElementById('activeRoomName').innerText = "Room: " + code;
        
        socket.emit('join', {room: code});
    }

    function createRoom() {
        const randomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
        document.getElementById('roomCode').value = randomCode;
        joinRoom();
    }

    function leaveRoom() {
        socket.emit('leave', {room: currentRoom});
        document.getElementById('roomSelector').style.display = 'block';
        document.getElementById('chatInterface').style.display = 'none';
        currentRoom = null;
    }

    function sendMessage() {
        const msg = document.getElementById('messageInput').value;
        if (!msg || !currentRoom) return;
        
        socket.emit('message', {room: currentRoom, message: msg});
        document.getElementById('messageInput').value = '';
    }

    socket.on('user_list', (data) => {
        const list = document.getElementById('userList');
        list.innerHTML = data.users.map(user => `
            <div class="user-item poppins">
                <i class="fas fa-circle"></i>
                ${user} ${user === "{{ current_user.username }}" ? "(You)" : ""}
            </div>
        `).join('');
    });

    socket.on('message', (data) => {
        const list = document.getElementById('messageList');
        const isSystem = data.user === 'System';
        const isSent = data.user === "{{ current_user.username }}";
        
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${isSent ? 'sent' : ''} ${isSystem ? 'system' : ''}`;
        
        if (isSystem) {
            msgDiv.style.alignSelf = 'center';
            msgDiv.style.fontSize = '0.8rem';
            msgDiv.style.background = 'transparent';
            msgDiv.style.border = 'none';
            msgDiv.style.opacity = '0.6';
            msgDiv.innerHTML = `<center>${data.message}</center>`;
        } else {
            msgDiv.innerHTML = `
                <div class="msg-user">${data.user}</div>
                <div class="msg-content">${data.message}</div>
            `;
        }
        
        list.appendChild(msgDiv);
        list.scrollTop = list.scrollHeight;
    });

    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
{% endblock %}
