{% extends "base.html" %}

{% block title %}Material Detail - StudyAI{% endblock %}

{% block content %}
<div class="material-detail-view">
    <div class="header">
        <a href="{{ url_for('dashboard.index') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back</a>
        <h1 class="poppins" id="materialTitle">Loading...</h1>
    </div>

    <div class="detail-grid">
        <!-- Summary Card -->
        <div class="card summary-card glass glass-card">
            <h3 class="poppins"><i class="fas fa-align-left"></i> AI Summary</h3>
            <div id="materialSummary" class="summary-content">
                <i class="fas fa-circle-notch fa-spin"></i> Reading material...
            </div>
        </div>

        <!-- Quick Access -->
        <div class="quick-access">
            <div class="card access-card glass glass-card" onclick="window.location.href='/learning-path/{{ material_id }}'">
                <i class="fas fa-route"></i>
                <div>
                    <h4 class="poppins">Learning Path</h4>
                    <p>Follow your customized roadmap</p>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </div>

            <div class="card access-card glass glass-card" onclick="window.location.href='{{ url_for('dashboard.flashcards') }}?material_id={{ material_id }}'">
                <i class="fas fa-layer-group"></i>
                <div>
                    <h4 class="poppins">Flashcards</h4>
                    <p>Practice with difficulty levels</p>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </div>

            <div class="card access-card glass glass-card" onclick="window.location.href='{{ url_for('dashboard.quizzes') }}?material_id={{ material_id }}'">
                <i class="fas fa-vial"></i>
                <div>
                    <h4 class="poppins">Quiz Mode</h4>
                    <p>Test your understanding</p>
                </div>
                <i class="fas fa-chevron-right arrow"></i>
            </div>
        </div>
    </div>
</div>

<style>
    .material-detail-view { max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .detail-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 2rem; margin-top: 2rem; }
    
    .summary-card { padding: 2.5rem; }
    .summary-content { margin-top: 1.5rem; color: var(--text-muted); line-height: 1.7; font-size: 1.05rem; }

    .quick-access { display: flex; flex-direction: column; gap: 1rem; }
    .access-card { 
        padding: 1.5rem; display: flex; align-items: center; gap: 1.5rem; 
        cursor: pointer; transition: var(--transition); 
    }
    .access-card:hover { border-color: var(--primary); transform: translateX(5px); }
    .access-card i:first-child { font-size: 1.5rem; color: var(--primary); width: 40px; }
    .access-card h4 { margin-bottom: 0.2rem; }
    .access-card p { font-size: 0.85rem; color: var(--text-muted); }
    .arrow { margin-left: auto; font-size: 0.8rem; opacity: 0.5; }

    @media (max-width: 900px) {
        .detail-grid { grid-template-columns: 1fr; }
    }
</style>

<script>
    const materialId = {{ material_id }};

    async function loadDetail() {
        try {
            const response = await fetch(`/api/material/${materialId}`);
            const data = await response.json();
            
            document.getElementById('materialTitle').innerText = data.filename.split('_').slice(1).join('_');
            document.getElementById('materialSummary').innerText = data.summary || "No summary was generated for this material. Please try re-uploading.";
            
            // Update counts if we want to show status
            const fcCount = data.flashcards ? data.flashcards.length : 0;
            const quizCount = data.quizzes && data.quizzes[0] ? data.quizzes[0].questions.length : 0;
            
            console.log(`Material Detail: Found ${fcCount} cards and ${quizCount} questions.`);
        } catch (err) {
            console.error(err);
        }
    }

    loadDetail();
</script>
{% endblock %}
